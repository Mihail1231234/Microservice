services:

  postgres:
    image: postgres:17
    container_name: user
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user
    volumes:
      - ./data_user:/docker-entrypoint-initdb.d:ro
      - data_user:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - app-network

  postgres2:
    image: postgres:17
    container_name: order
    environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: order
    volumes:
       - ./data_order:/docker-entrypoint-initdb.d:ro
       - data_order:/var/lib/postgresql/data
    ports:
        - "5433:5432"
    networks:
        - app-network

  # Redis
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - app-network

  # Redis-Insight
  redis-insight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    restart: always
    depends_on:
      - redis
    ports:
      - "5540:5540"
    volumes:
      - redis-insight:/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  data_user:
  data_order:
  redis-insight:
